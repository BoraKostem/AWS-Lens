appId: com.infralens.desktop
productName: InfraLens
generateUpdatesFilesForAllChannels: true

directories:
  output: release
  buildResources: assets

files:
  - out/**
  - assets/**
  - node_modules/**/*
  - package.json

asarUnpack:
  - node_modules/node-pty/**/*

publish:
  provider: github
  owner: BoraKostem
  repo: InfraLens

win:
  artifactName: InfraLens-Setup-${version}.${ext}
  target:
    - nsis
  icon: assets/infra-lens-logo.ico
  signtoolOptions:
    sign: build/win-custom-sign.cjs
    signingHashAlgorithms:
      - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  artifactName: InfraLens-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: assets/infra-lens-logo.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  notarize: true

linux:
  artifactName: infra-lens_${version}_${arch}.${ext}
  category: Development
  maintainer: Bora Kostem <BoraKostem@users.noreply.github.com>
  target:
    - deb
    - AppImage
  icon: assets/infra-lens-logo.png
