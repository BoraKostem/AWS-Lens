name: Build And Release Installers

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version in x.x.x format
        required: true
        type: string
      target_platform:
        description: Which installer set to build and release
        required: true
        type: choice
        options:
          - all
          - windows
          - mac
          - linux

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Build selected matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers","artifact_glob":"release/*.exe"}]}'
              ;;
            mac)
              matrix='{"include":[{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/*.dmg\nrelease/*.zip"}]}'
              ;;
            linux)
              matrix='{"include":[{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/*.deb\nrelease/*.AppImage"}]}'
              ;;
            all)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers","artifact_glob":"release/*.exe"},{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/*.dmg\nrelease/*.zip"},{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/*.deb\nrelease/*.AppImage"}]}'
              ;;
            *)
              echo "Unsupported target_platform=${{ github.event.inputs.target_platform }}" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK_MAC || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD_MAC || '' }}
      APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
      APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
      APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Validate version input
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.app_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected app_version in x.x.x format" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set package version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version='${{ github.event.inputs.app_version }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"

      - name: Materialize App Store Connect API key file
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          if printf '%s' "$APPLE_API_KEY_SECRET" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s' "$APPLE_API_KEY_SECRET" > "$key_path"
          else
            printf '%s' "$APPLE_API_KEY_SECRET" | base64 --decode > "$key_path"
          fi
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Validate App Store Connect API key file
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          grep -q 'BEGIN PRIVATE KEY' "$APPLE_API_KEY"
          openssl pkey -in "$APPLE_API_KEY" -inform PEM -noout

      - name: Validate SSL.com eSigner CKA secrets
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          [ -n "${{ secrets.ES_USERNAME }}" ] || { echo "Missing secret: ES_USERNAME" >&2; exit 1; }
          [ -n "${{ secrets.ES_PASSWORD }}" ] || { echo "Missing secret: ES_PASSWORD" >&2; exit 1; }
          [ -n "${{ secrets.ES_TOTP_SECRET }}" ] || { echo "Missing secret: ES_TOTP_SECRET" >&2; exit 1; }
          [ -n "${{ secrets.CREDENTIAL_ID }}" ] || { echo "Missing secret: CREDENTIAL_ID" >&2; exit 1; }

      - name: Install SSL.com CodeSignTool
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'CodeSignTool.zip'
          $extract = Join-Path $env:GITHUB_WORKSPACE 'tools'
          Invoke-WebRequest -OutFile $zip 'https://github.com/SSLcom/CodeSignTool/releases/latest/download/CodeSignTool-v1.3.2-windows.zip'
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $tool = Get-ChildItem -Path $extract -Recurse -Filter CodeSignTool.bat | Select-Object -First 1
          if (-not $tool) {
            throw 'CodeSignTool.bat was not found after extracting the archive.'
          }
          "SSLCOM_CODESIGNTOOL_PATH=$($tool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installers with code signing
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
          CREDENTIAL_ID: ${{ secrets.CREDENTIAL_ID }}
        run: |
          pnpm dist:win

      - name: Build non-Windows installers
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.build_command }}

      - name: Verify Windows installer signature
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe -File | Select-Object -First 1
          if (-not $installer) {
            throw 'No Windows installer .exe found in release/.'
          }
          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          $signature | Format-List *
          if ($signature.Status -ne 'Valid') {
            throw "Expected a valid Authenticode signature, got: $($signature.Status)"
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: |
      always() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Validate selected artifacts exist
        shell: bash
        run: |
          shopt -s globstar nullglob
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              files=(dist-artifacts/windows-installers/**/*.exe)
              ;;
            mac)
              files=(dist-artifacts/macos-installers/**/*.dmg dist-artifacts/macos-installers/**/*.zip)
              ;;
            linux)
              files=(dist-artifacts/linux-installers/**/*.deb dist-artifacts/linux-installers/**/*.AppImage)
              ;;
            all)
              files=(
                dist-artifacts/windows-installers/**/*.exe
                dist-artifacts/macos-installers/**/*.dmg
                dist-artifacts/macos-installers/**/*.zip
                dist-artifacts/linux-installers/**/*.deb
                dist-artifacts/linux-installers/**/*.AppImage
              )
              ;;
          esac
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found for target_platform=${{ github.event.inputs.target_platform }}" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.app_version }}
          name: v${{ github.event.inputs.app_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ github.event.inputs.target_platform == 'windows' && 'dist-artifacts/windows-installers/**/*.exe' || '' }}
            ${{ github.event.inputs.target_platform == 'mac' && 'dist-artifacts/macos-installers/**/*.dmg' || '' }}
            ${{ github.event.inputs.target_platform == 'mac' && 'dist-artifacts/macos-installers/**/*.zip' || '' }}
            ${{ github.event.inputs.target_platform == 'linux' && 'dist-artifacts/linux-installers/**/*.deb' || '' }}
            ${{ github.event.inputs.target_platform == 'linux' && 'dist-artifacts/linux-installers/**/*.AppImage' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/windows-installers/**/*.exe' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/macos-installers/**/*.dmg' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/macos-installers/**/*.zip' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/linux-installers/**/*.deb' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/linux-installers/**/*.AppImage' || '' }}

  cleanup:
    name: Cleanup workflow artifacts
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build
      - publish

    steps:
      - name: Delete current run artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifactNames = new Set([
              'windows-installers',
              'macos-installers',
              'linux-installers',
            ]);

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id, per_page: 100 }
            );

            for (const artifact of artifacts) {
              if (!artifactNames.has(artifact.name)) continue;
              core.info(`Deleting artifact: ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
